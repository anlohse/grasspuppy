name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: false
        default: ''

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.version.outputs.release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine release version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version="${GITHUB_REF#refs/tags/}"
          elif [[ "${{ github.event.inputs.version }}" != "" ]]; then
            version="${{ github.event.inputs.version }}"
          else
            version=$(node -p "require('./package.json').version")
          fi
          echo "release_version=$version" >> $GITHUB_OUTPUT

      - name: Verify version consistency
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          pkgVersion=$(node -p "require('./package.json').version")
          if [ "$tag" != "$pkgVersion" ]; then
            echo "package.json version ($pkgVersion) does not match tag ($tag)"
            exit 1
          fi

  package:
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: win
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Package application
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "linux" ]; then
            npx electron-builder --linux AppImage --config.extraMetadata.version=${{ needs.prepare.outputs.release_version }}
          else
            npx electron-builder --win nsis --config.extraMetadata.version=${{ needs.prepare.outputs.release_version }}
          fi

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: release/*

  publish:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub release and upload packages
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare.outputs.release_version }}
          release_name: "Grasspuppy ${{ needs.prepare.outputs.release_version }}"
          body: "Cross-platform Grasspuppy release for Windows and Linux."
          files: release-assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
